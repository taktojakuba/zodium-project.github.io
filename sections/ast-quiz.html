<div class="home-section">
                <div class="home-section-inner quiz-page">
                    <div class="section-eyebrow">get started</div>
                    <h2 class="section-heading">Find your flavour</h2>
                    <p class="section-sub">A few questions — we'll point you to the right image.</p>

                    <div class="flavour-quiz" id="flavour-quiz-2">
                        <div class="quiz-progress">
                            <div class="quiz-pip"></div>
                            <div class="quiz-pip"></div>
                            <div class="quiz-pip"></div>
                        </div>

                        <!-- Q1 -->
                        <div class="quiz-step active">
                            <div class="quiz-q">Do you want a desktop session?</div>

                            </div>
                        </div>

                        <!-- Q2 -->
                        <div class="quiz-step">
                            <div class="quiz-q">What type of desktop session do you prefer?</div>

                                <div class="quiz-option" data-val="floating">Floating</div>

                        <div class="quiz-step">
                            <div class="quiz-q">What vendor is your primary GPU from?</div>
                            <div class="quiz-options">

                                <div class="quiz-option" data-val="amd">AMD</div>
                                <div class="quiz-option" data-val="nvidia">Nvidia</div>
                            </div>
                        </div>

                        <!-- Result -->
                        <div class="quiz-result" id="quiz-result-2">

                    </div>
